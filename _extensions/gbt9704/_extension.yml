name: gbt9704
title: GB/T 9704 文档格式
author: songwupei
version: 0.3.1
quarto-required: ">=1.4.0"
contributes:
  formats:
    html:
      template: gbt9704.html
      css: assets/gbt9704.css
      minimal: true
      top-level-division: section
      filters:
        - assets/filters/gbt9704-metadata.lua
        - assets/filters/heading-demotion.lua
        - assets/filters/title-promotion.lua
        - assets/filters/gbt9704-emoji.lua
    docx:
      reference-doc: assets/reference-gbt9704.docx
      filters:
        - assets/filters/gbt9704-metadata.lua
        - assets/filters/heading-demotion.lua
        - assets/filters/title-promotion.lua
        - assets/filters/normalize-styles.lua
        - assets/filters/gbt9704-emoji.lua
    context:
      keep-tex: true
      pdf-engine: context
      template: context-template.tex
      top-level-division: section
      output-file: document-context
      filters:
        - assets/filters/gbt9704-metadata.lua
        - assets/filters/heading-demotion.lua
        - assets/filters/title-promotion.lua
        - assets/filters/fakebold.lua
        - assets/filters/context-support.lua
        - assets/filters/natural-table.lua
        - assets/filters/gbt9704-emoji.lua
      variables:
        gbtfontpreset: "reference"
    pdf:
      keep-tex: true
      documentclass: gbt9704
      pdf-engine: xelatex
      format-resources:
        - gbt9704.cls
        - assets/zhlineskip.sty
      filters:
        - assets/filters/gbt9704-metadata.lua
        - assets/filters/heading-demotion.lua
        - assets/filters/title-promotion.lua
        - assets/filters/format-legal.lua
        - assets/filters/fcolumn.lua
        - assets/filters/gbt9704-emoji.lua
